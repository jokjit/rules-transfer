name: 编译规则集

on:
  workflow_dispatch:
    inputs:
      rule_url:
        description: "可选 新规则链接（JSON/YAML）"
        required: false
        type: string
      rule_name:
        description: "可选 规则名称（不含扩展名）"
        required: false
        type: string
      rule_format:
        description: "规则格式（json→srs / yaml→mrs）"
        required: false
        default: "json"
        type: choice
        options:
          - json
          - yaml
      rule_type:
        description: "YAML 规则类型（仅 yaml 时有效）"
        required: false
        default: "domain"
        type: choice
        options:
          - domain
          - ipcidr
          - classical
  schedule:
    - cron: "0 0 * * *"
  push:
    paths:
      - "rules/**.json"
      - "rules/**.yaml"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name }}
      INPUT_URL:    ${{ github.event.inputs.rule_url }}
      INPUT_NAME:   ${{ github.event.inputs.rule_name }}
      INPUT_FORMAT: ${{ github.event.inputs.rule_format || 'json' }}
      INPUT_TYPE:   ${{ github.event.inputs.rule_type  || 'domain' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -q
          sudo apt-get install -y jq curl wget python3-yaml

      # ── 更新 sources.json ────────────────────────────────────────────────
      - name: Update sources.json
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rule_url != '' }}
        run: |
          set -e

          if [ -z "$INPUT_NAME" ]; then
            echo "::error::请同时填写规则名称"
            exit 1
          fi

          # 将 GitHub 网页 blob/raw 链接自动归一化为 raw 直链
          normalize_url() {
            local url="$1"
            if [[ "$url" =~ ^https://github\.com/([^/]+)/([^/]+)/blob/(.+)$ ]]; then
              echo "https://raw.githubusercontent.com/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}/${BASH_REMATCH[3]}"
            elif [[ "$url" =~ ^https://github\.com/([^/]+)/([^/]+)/raw/(.+)$ ]]; then
              echo "https://raw.githubusercontent.com/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}/${BASH_REMATCH[3]}"
            else
              echo "$url"
            fi
          }

          INPUT_URL=$(normalize_url "$INPUT_URL")
          echo "Normalized URL: $INPUT_URL"

          EXISTS=$(jq --arg n "$INPUT_NAME" 'any(.[]; .name == $n)' rules/sources.json)

          build_entry() {
            # 输出一个 jq 对象片段
            if [ "$INPUT_FORMAT" = "yaml" ]; then
              jq -n --arg n "$INPUT_NAME" --arg u "$INPUT_URL" \
                    --arg fmt "$INPUT_FORMAT" --arg t "$INPUT_TYPE" \
                '{"name":$n,"url":$u,"format":$fmt,"type":$t}'
            else
              jq -n --arg n "$INPUT_NAME" --arg u "$INPUT_URL" --arg fmt "$INPUT_FORMAT" \
                '{"name":$n,"url":$u,"format":$fmt}'
            fi
          }

          if [ "$EXISTS" = "true" ]; then
            ENTRY=$(build_entry)
            jq --arg n "$INPUT_NAME" --argjson e "$ENTRY" \
              'map(if .name == $n then $e else . end)' \
              rules/sources.json > tmp.json
          else
            ENTRY=$(build_entry)
            jq --argjson e "$ENTRY" '. += [$e]' rules/sources.json > tmp.json
          fi

          mv tmp.json rules/sources.json
          echo "Done: $INPUT_NAME → $INPUT_URL ($INPUT_FORMAT)"

      # ── 下载规则源文件 ───────────────────────────────────────────────────
      - name: Download rules
        run: |
          set -e
          mkdir -p rules output

          normalize_url() {
            local url="$1"
            if [[ "$url" =~ ^https://github\.com/([^/]+)/([^/]+)/blob/(.+)$ ]]; then
              echo "https://raw.githubusercontent.com/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}/${BASH_REMATCH[3]}"
            elif [[ "$url" =~ ^https://github\.com/([^/]+)/([^/]+)/raw/(.+)$ ]]; then
              echo "https://raw.githubusercontent.com/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}/${BASH_REMATCH[3]}"
            else
              echo "$url"
            fi
          }

          COUNT=$(jq 'length' rules/sources.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "sources.json 为空，跳过"
            exit 0
          fi

          while IFS= read -r item; do
            name=$(jq -r '.name'             <<< "$item")
            url=$(jq  -r '.url'              <<< "$item")
            fmt=$(jq  -r '.format // "json"' <<< "$item")

            url=$(normalize_url "$url")
            echo "Downloading $name ($fmt) from $url"

            if ! curl -fsSL "$url" -o "rules/${name}.${fmt}"; then
              echo "::warning::下载失败: $name ($url)"
              continue
            fi

            # 校验：文件是否为空，或误下载成了 HTML 页面
            if [ ! -s "rules/${name}.${fmt}" ]; then
              echo "::error::$name 下载结果为空文件: $url"
              exit 1
            fi
            if head -c 200 "rules/${name}.${fmt}" | grep -qi "<!DOCTYPE html>"; then
              echo "::error::$name 下载到的是 HTML 页面而非规则内容，链接可能不是 raw 直链: $url"
              exit 1
            fi
          done < <(jq -c '.[]' rules/sources.json)

      # ── 下载 sing-box ────────────────────────────────────────────────────
      - name: Download sing-box
        run: |
          set -e
          VER=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
                | jq -r '.tag_name' | sed 's/^v//')
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${VER}/sing-box-${VER}-linux-amd64.tar.gz"
          tar -xzf sing-box-*.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      # ── 下载 mihomo ──────────────────────────────────────────────────────
      - name: Download mihomo
        run: |
          set -e
          VER=$(curl -s https://api.github.com/repos/metacubex/mihomo/releases/latest \
                | jq -r '.tag_name')                     # 保留 v 前缀，mihomo 用带 v 的路径
          FILE="mihomo-linux-amd64-${VER}.gz"
          wget -q "https://github.com/metacubex/mihomo/releases/download/${VER}/${FILE}"
          gzip -d "$FILE"
          sudo mv "mihomo-linux-amd64-${VER}" /usr/local/bin/mihomo
          sudo chmod +x /usr/local/bin/mihomo
          mihomo -v

      # ── 编译 ─────────────────────────────────────────────────────────────
      - name: Compile rules
        run: |
          set -e
          mkdir -p output
          HAS_ERROR=0

          cat > compile_yaml.py <<'PYEOF'
          import sys, re, os, subprocess, yaml

          name, src, rtype, outdir = sys.argv[1:5]

          with open(src, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or {}
          payload = [str(x).strip() for x in (data.get("payload") or [])]

          domain_exact_re  = re.compile(r'^DOMAIN,(.+)$')
          domain_suffix_re = re.compile(r'^DOMAIN-SUFFIX,(.+)$')
          ipcidr_re        = re.compile(r'^(IP-CIDR|IP-CIDR6),([^,]+)(,no-resolve)?$')
          # domain 域名系但 mrs 无法表达的类型（keyword/regex），以及其他任何不认识的类型
          # 一律归入"保留原样、不编译"的 classical 文件

          mrs_domain, mrs_ipcidr, classical_only = [], [], []

          for line in payload:
              m = domain_exact_re.match(line)
              if m:
                  mrs_domain.append(m.group(1))          # 裸域名，精确匹配
                  continue
              m = domain_suffix_re.match(line)
              if m:
                  mrs_domain.append("+." + m.group(1))    # +. 前缀 = 后缀匹配
                  continue
              m = ipcidr_re.match(line)
              if m:
                  mrs_ipcidr.append(m.group(2))           # 裸 CIDR，去掉前缀和 no-resolve
                  continue
              # DOMAIN-KEYWORD / DOMAIN-REGEX / IP-ASN 等：mrs 无法表达，保留原始 classical 格式
              classical_only.append(line)

          def convert(lines, behavior, dst):
              if not lines:
                  return True
              tmp_yaml = dst + ".src.yaml"
              with open(tmp_yaml, "w", encoding="utf-8") as f:
                  yaml.safe_dump({"payload": lines}, f, allow_unicode=True)
              r = subprocess.run(
                  ["mihomo", "convert-ruleset", behavior, "yaml", tmp_yaml, dst],
                  capture_output=True, text=True
              )
              os.remove(tmp_yaml)
              if r.returncode != 0:
                  print(f"::error::[{name}] 转换({behavior}) 失败: {r.stderr.strip()[:300]}", file=sys.stderr)
                  return False
              print(f"✓ {os.path.basename(dst)} ({len(lines)} 条)", file=sys.stderr)
              return True

          ok = True
          ok = convert(mrs_domain, "domain", os.path.join(outdir, f"{name}.mrs")) and ok
          ok = convert(mrs_ipcidr, "ipcidr", os.path.join(outdir, f"{name}-ipcidr.mrs")) and ok

          if classical_only:
              cpath = os.path.join(outdir, f"{name}-classical.yaml")
              with open(cpath, "w", encoding="utf-8") as f:
                  yaml.safe_dump({"payload": classical_only}, f, allow_unicode=True)
              print(f"::warning::[{name}] {len(classical_only)} 条规则 mrs 无法表达（如 DOMAIN-KEYWORD/DOMAIN-REGEX/IP-ASN），已原样保存为 {name}-classical.yaml，需以 behavior: classical, format: yaml 方式引用", file=sys.stderr)

          if not mrs_domain and not mrs_ipcidr and not classical_only:
              print(f"::error::[{name}] 无有效规则", file=sys.stderr)
              ok = False

          sys.exit(0 if ok else 1)
          PYEOF

          while IFS= read -r item; do
            name=$(jq  -r '.name'              <<< "$item")
            fmt=$(jq   -r '.format // "json"'  <<< "$item")
            rtype=$(jq -r '.type   // "domain"' <<< "$item")

            case "$fmt" in
              json)
                src="rules/${name}.json"
                dst="output/${name}.srs"
                rm -f "$dst"
                if sing-box rule-set compile --output "$dst" "$src"; then
                  echo "✓ ${name}.srs"
                else
                  echo "✗ FAILED: $name (json→srs)"
                  HAS_ERROR=1
                fi
                ;;
              yaml)
                echo "Compiling $name.yaml ..."
                rm -f "output/${name}.mrs" "output/${name}-ipcidr.mrs" "output/${name}-classical.yaml"
                if python3 compile_yaml.py "$name" "rules/${name}.yaml" "$rtype" "output"; then
                  :
                else
                  echo "✗ FAILED: $name (yaml→mrs)"
                  HAS_ERROR=1
                fi
                ;;
              *)
                echo "⚠ 未知格式: $fmt，跳过 $name"
                ;;
            esac
          done < <(jq -c '.[]' rules/sources.json)

          [ $HAS_ERROR -eq 0 ]
      # ── 提交 ─────────────────────────────────────────────────────────────
      - name: Commit changes
        if: always()
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rules/ output/

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_NAME" ]]; then
            git commit -m "Update rule: $INPUT_NAME"
          else
            git commit -m "Auto update rules"
          fi

          git push
