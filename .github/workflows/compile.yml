name: 编译规则集

on:
  workflow_dispatch:
    inputs:
      rule_url:
        description: "可选 新规则链接（JSON/YAML）"
        required: false
        type: string
      rule_name:
        description: "可选 规则名称（不含扩展名）"
        required: false
        type: string
      rule_format:
        description: "规则格式（json→srs / yaml→mrs）"
        required: false
        default: "json"
        type: choice
        options:
          - json
          - yaml
      rule_type:
        description: "YAML 规则类型（仅 yaml 时有效）"
        required: false
        default: "domain"
        type: choice
        options:
          - domain
          - ipcidr
          - classical
  schedule:
    - cron: "0 0 * * *"
  push:
    paths:
      - "rules/**.json"
      - "rules/**.yaml"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name }}
      INPUT_URL:    ${{ github.event.inputs.rule_url }}
      INPUT_NAME:   ${{ github.event.inputs.rule_name }}
      INPUT_FORMAT: ${{ github.event.inputs.rule_format || 'json' }}
      INPUT_TYPE:   ${{ github.event.inputs.rule_type  || 'domain' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -q
          sudo apt-get install -y jq curl wget python3-yaml

      # ── 更新 sources.json ────────────────────────────────────────────────
      - name: Update sources.json
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rule_url != '' }}
        run: |
          set -e

          if [ -z "$INPUT_NAME" ]; then
            echo "::error::请同时填写规则名称"
            exit 1
          fi

          # 将 GitHub 网页 blob/raw 链接自动归一化为 raw 直链
          normalize_url() {
            local url="$1"
            if [[ "$url" =~ ^https://github\.com/([^/]+)/([^/]+)/blob/(.+)$ ]]; then
              echo "https://raw.githubusercontent.com/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}/${BASH_REMATCH[3]}"
            elif [[ "$url" =~ ^https://github\.com/([^/]+)/([^/]+)/raw/(.+)$ ]]; then
              echo "https://raw.githubusercontent.com/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}/${BASH_REMATCH[3]}"
            else
              echo "$url"
            fi
          }

          INPUT_URL=$(normalize_url "$INPUT_URL")
          echo "Normalized URL: $INPUT_URL"

          EXISTS=$(jq --arg n "$INPUT_NAME" 'any(.[]; .name == $n)' rules/sources.json)

          build_entry() {
            # 输出一个 jq 对象片段
            if [ "$INPUT_FORMAT" = "yaml" ]; then
              jq -n --arg n "$INPUT_NAME" --arg u "$INPUT_URL" \
                    --arg fmt "$INPUT_FORMAT" --arg t "$INPUT_TYPE" \
                '{"name":$n,"url":$u,"format":$fmt,"type":$t}'
            else
              jq -n --arg n "$INPUT_NAME" --arg u "$INPUT_URL" --arg fmt "$INPUT_FORMAT" \
                '{"name":$n,"url":$u,"format":$fmt}'
            fi
          }

          if [ "$EXISTS" = "true" ]; then
            ENTRY=$(build_entry)
            jq --arg n "$INPUT_NAME" --argjson e "$ENTRY" \
              'map(if .name == $n then $e else . end)' \
              rules/sources.json > tmp.json
          else
            ENTRY=$(build_entry)
            jq --argjson e "$ENTRY" '. += [$e]' rules/sources.json > tmp.json
          fi

          mv tmp.json rules/sources.json
          echo "Done: $INPUT_NAME → $INPUT_URL ($INPUT_FORMAT)"

      # ── 下载规则源文件 ───────────────────────────────────────────────────
      - name: Download rules
        run: |
          set -e
          mkdir -p rules output

          normalize_url() {
            local url="$1"
            if [[ "$url" =~ ^https://github\.com/([^/]+)/([^/]+)/blob/(.+)$ ]]; then
              echo "https://raw.githubusercontent.com/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}/${BASH_REMATCH[3]}"
            elif [[ "$url" =~ ^https://github\.com/([^/]+)/([^/]+)/raw/(.+)$ ]]; then
              echo "https://raw.githubusercontent.com/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}/${BASH_REMATCH[3]}"
            else
              echo "$url"
            fi
          }

          COUNT=$(jq 'length' rules/sources.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "sources.json 为空，跳过"
            exit 0
          fi

          while IFS= read -r item; do
            name=$(jq -r '.name'             <<< "$item")
            url=$(jq  -r '.url'              <<< "$item")
            fmt=$(jq  -r '.format // "json"' <<< "$item")

            url=$(normalize_url "$url")
            echo "Downloading $name ($fmt) from $url"

            if ! curl -fsSL "$url" -o "rules/${name}.${fmt}"; then
              echo "::warning::下载失败: $name ($url)"
              continue
            fi

            # 校验：文件是否为空，或误下载成了 HTML 页面
            if [ ! -s "rules/${name}.${fmt}" ]; then
              echo "::error::$name 下载结果为空文件: $url"
              exit 1
            fi
            if head -c 200 "rules/${name}.${fmt}" | grep -qi "<!DOCTYPE html>"; then
              echo "::error::$name 下载到的是 HTML 页面而非规则内容，链接可能不是 raw 直链: $url"
              exit 1
            fi
          done < <(jq -c '.[]' rules/sources.json)

      # ── 下载 sing-box ────────────────────────────────────────────────────
      - name: Download sing-box
        run: |
          set -e
          VER=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
                | jq -r '.tag_name' | sed 's/^v//')
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${VER}/sing-box-${VER}-linux-amd64.tar.gz"
          tar -xzf sing-box-*.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      # ── 下载 mihomo ──────────────────────────────────────────────────────
      - name: Download mihomo
        run: |
          set -e
          VER=$(curl -s https://api.github.com/repos/metacubex/mihomo/releases/latest \
                | jq -r '.tag_name')                     # 保留 v 前缀，mihomo 用带 v 的路径
          FILE="mihomo-linux-amd64-${VER}.gz"
          wget -q "https://github.com/metacubex/mihomo/releases/download/${VER}/${FILE}"
          gzip -d "$FILE"
          sudo mv "mihomo-linux-amd64-${VER}" /usr/local/bin/mihomo
          sudo chmod +x /usr/local/bin/mihomo
          mihomo -v

      # ── 编译 ─────────────────────────────────────────────────────────────
      - name: Compile rules
        run: |
          set -e
          mkdir -p output
          HAS_ERROR=0

          # 过滤掉 mrs 转换器不支持、会导致 panic 的规则类型
          cat > sanitize_yaml.py <<'PYEOF'
          import sys, re, yaml

          path = sys.argv[1]
          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or {}

          payload = data.get("payload") or []

          allowed = re.compile(
              r'^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN-REGEX),[^,]+$'
              r'|^(IP-CIDR|IP-CIDR6),[^,]+(,no-resolve)?$'
          )

          kept, dropped = [], []
          for line in payload:
              s = str(line).strip()
              if allowed.match(s):
                  kept.append(s)
              else:
                  dropped.append(s)

          for d in dropped:
              print(f"::warning::丢弃不支持的规则行: {d}", file=sys.stderr)

          with open(path, "w", encoding="utf-8") as f:
              yaml.safe_dump({"payload": kept}, f, allow_unicode=True)

          print(f"kept={len(kept)} dropped={len(dropped)}", file=sys.stderr)
          if len(kept) == 0:
              print("::error::过滤后规则列表为空", file=sys.stderr)
              sys.exit(1)
          PYEOF

          while IFS= read -r item; do
            name=$(jq  -r '.name'              <<< "$item")
            fmt=$(jq   -r '.format // "json"'  <<< "$item")
            rtype=$(jq -r '.type   // "domain"' <<< "$item")

            case "$fmt" in
              json)
                src="rules/${name}.json"
                dst="output/${name}.srs"
                rm -f "$dst"
                if sing-box rule-set compile --output "$dst" "$src"; then
                  echo "✓ ${name}.srs"
                else
                  echo "✗ FAILED: $name (json→srs)"
                  HAS_ERROR=1
                fi
                ;;
              yaml)
                src="rules/${name}.yaml"
                dst="output/${name}.mrs"
                rm -f "$dst"

                echo "Sanitizing $name.yaml ..."
                if ! python3 sanitize_yaml.py "$src"; then
                  echo "✗ FAILED: $name (sanitize)"
                  HAS_ERROR=1
                  continue
                fi

                if mihomo convert-ruleset "$rtype" yaml "$src" "$dst"; then
                  echo "✓ ${name}.mrs"
                else
                  echo "✗ FAILED: $name (yaml[$rtype]→mrs)"
                  HAS_ERROR=1
                fi
                ;;
              *)
                echo "⚠ 未知格式: $fmt，跳过 $name"
                ;;
            esac
          done < <(jq -c '.[]' rules/sources.json)

          [ $HAS_ERROR -eq 0 ]

      # ── 提交 ─────────────────────────────────────────────────────────────
      - name: Commit changes
        if: always()
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rules/ output/

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_NAME" ]]; then
            git commit -m "Update rule: $INPUT_NAME"
          else
            git commit -m "Auto update rules"
          fi

          git push
